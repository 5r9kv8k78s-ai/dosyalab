services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: formatflow-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - api_uploads:/app/storage
    networks:
      - formatflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: formatflow-web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - formatflow

networks:
  formatflow:
    driver: bridge

volumes:
  api_uploads:
