[alembic]
script_location = migrations

# Intentionally no sqlalchemy.url here — the connection string is a secret
# and must never live in a checked-in config file. migrations/env.py reads
# DATABASE_URL from app.core.config.get_settings() instead (which itself
# reads from the environment / apps/api/.env, both gitignored).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
